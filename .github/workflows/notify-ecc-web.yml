name: Notify ecc-web on Release

on:
  push:
    branches: ["main"]

jobs:
  dispatch:
    name: Trigger ecc-web Sync & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Send repository_dispatch to ecc-web
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.ECC_WEB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/sifxprime/ecc-web/dispatches \
            -d '{"event_type":"ecc-release"}')
          echo "Response status: $STATUS"
          [ "$STATUS" = "204" ] && echo "✅ ecc-web sync triggered!" || echo "❌ Dispatch failed — check ECC_WEB_TOKEN secret"
