<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">

  <rect width="400" height="400" fill="#ffffff"/>

  <!-- Payth Mark — Payment Loop -->
  <!-- Solid forward chevron  >  (outgoing / send) — dominant, emerald -->
  <!-- Ghost mirror chevron   <  (incoming / receive) — faint echo -->
  <!-- Two apexes point OUTWARD from a shared center: the payment loop. -->
  <g stroke-linecap="round" stroke-linejoin="round" fill="none" stroke="#34D399">

    <!-- ghost — mirror, apex left, thin receding trail -->
    <polyline points="228,100 140,200 228,300"
              stroke-width="10" stroke-opacity="0.15"/>

    <!-- solid — forward, apex right, full weight -->
    <polyline points="172,100 260,200 172,300"
              stroke-width="32"/>

  </g>

</svg>
