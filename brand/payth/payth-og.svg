<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630"
     font-family="'Space Grotesk','Inter',system-ui,-apple-system,sans-serif">

  <rect width="1200" height="630" fill="#0a0a0a"/>

  <!-- Payment Loop mark, large, left of the wordmark -->
  <g stroke-linecap="round" stroke-linejoin="round" fill="none" stroke="#34D399"
     transform="translate(300,300)">
    <!-- ghost — mirror, apex left -->
    <polyline points="70,-125 -75,0 70,125"
              stroke-width="16" stroke-opacity="0.30"/>
    <!-- solid — forward, apex right -->
    <polyline points="-40,-125 70,0 -40,125"
              stroke-width="46"/>
  </g>

  <text x="470" y="290" font-size="130" font-weight="700" fill="#F4F6F5"
        letter-spacing="8">PAYTH</text>
  <text x="474" y="360" font-size="30" font-weight="400" fill="#34D399"
        letter-spacing="6">Payment gateway · by Kodelyth</text>
  <text x="474" y="405" font-size="24" font-weight="400" fill="#F4F6F5" fill-opacity="0.55"
        letter-spacing="2">Accept payments across Bangladesh — one simple API.</text>

  <text x="300" y="560" font-size="22" font-weight="400" fill="#F4F6F5" fill-opacity="0.4"
        letter-spacing="3" text-anchor="middle">kodelyth.org</text>

</svg>
