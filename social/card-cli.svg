<svg viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0d1117"/><stop offset="1" stop-color="#161b22"/></linearGradient></defs>
  <rect width="680" height="520" rx="18" fill="url(#bg)"/><rect width="680" height="520" rx="18" fill="none" stroke="#21262d" stroke-width="1.5"/>
  <rect x="40" y="40" width="160" height="26" rx="13" fill="#38bdf8" fill-opacity="0.12" stroke="#38bdf8" stroke-opacity="0.4"/>
  <text x="120" y="57" font-size="12" fill="#38bdf8" text-anchor="middle" font-weight="700" letter-spacing="1.5">INTERACTIVE CLI</text>
  <text x="40" y="112" font-size="30" font-weight="800" fill="#ffffff">One command,</text>
  <text x="40" y="150" font-size="30" font-weight="800" fill="#ffffff">a whole control panel</text>
  <text x="40" y="184" font-size="14.5" fill="#8b949e">Type kodelythecc for an arrow-key menu.</text>
  <!-- terminal -->
  <rect x="40" y="212" width="600" height="200" rx="12" fill="#0a0c10" stroke="#30363d"/>
  <circle cx="62" cy="234" r="4" fill="#f87171"/><circle cx="78" cy="234" r="4" fill="#fbbf24"/><circle cx="94" cy="234" r="4" fill="#34d399"/>
  <text x="300" y="238" font-size="10.5" fill="#6e7681" font-family="monospace">⚙ Kodelyth ECC v2.5.4 · up to date</text>
  <g font-family="monospace" font-size="14">
   <text x="62" y="272" fill="#38bdf8" font-weight="700">▸ Open Dashboard</text>
   <text x="62" y="298" fill="#8b949e">  Install for another IDE</text>
   <text x="62" y="324" fill="#8b949e">  RTK / Terse / Codebase status</text>
   <text x="62" y="350" fill="#8b949e">  Health check (doctor)</text>
   <text x="62" y="376" fill="#8b949e">  Run in background · Uninstall</text>
