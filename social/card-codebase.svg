<svg viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0d1117"/><stop offset="1" stop-color="#161b22"/></linearGradient>
  <marker id="ap" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto"><path d="M0,0 L5,3 L0,6 Z" fill="#a78bfa" opacity="0.85"/></marker></defs>
  <rect width="680" height="520" rx="18" fill="url(#bg)"/><rect width="680" height="520" rx="18" fill="none" stroke="#21262d" stroke-width="1.5"/>
  <rect x="40" y="40" width="176" height="26" rx="13" fill="#a78bfa" fill-opacity="0.14" stroke="#a78bfa" stroke-opacity="0.4"/>
  <text x="128" y="57" font-size="12" fill="#a78bfa" text-anchor="middle" font-weight="700" letter-spacing="1.5">CODEBASE GRAPH</text>
  <text x="40" y="112" font-size="30" font-weight="800" fill="#ffffff">Ask "who calls this?"</text>
  <text x="40" y="150" font-size="30" font-weight="800" fill="#ffffff">— skip the grep</text>
  <text x="40" y="184" font-size="14.5" fill="#8b949e">AST graph across 158 languages via tree-sitter.</text>
  <!-- node graph -->
  <circle cx="120" cy="270" r="22" fill="#a78bfa" fill-opacity="0.15" stroke="#a78bfa" stroke-opacity="0.6" stroke-width="1.5"/><text x="120" y="274" font-size="11" fill="#c4b5fd" text-anchor="middle" font-weight="700">main</text>
  <circle cx="240" cy="238" r="20" fill="#a78bfa" fill-opacity="0.1" stroke="#a78bfa" stroke-opacity="0.45"/><text x="240" y="242" font-size="10" fill="#c4b5fd" text-anchor="middle">auth</text>
  <circle cx="240" cy="302" r="20" fill="#a78bfa" fill-opacity="0.1" stroke="#a78bfa" stroke-opacity="0.45"/><text x="240" y="306" font-size="10" fill="#c4b5fd" text-anchor="middle">order</text>
  <circle cx="360" cy="270" r="20" fill="#a78bfa" fill-opacity="0.1" stroke="#a78bfa" stroke-opacity="0.45"/><text x="360" y="274" font-size="10" fill="#c4b5fd" text-anchor="middle">db</text>
  <line x1="142" y1="262" x2="222" y2="244" stroke="#a78bfa" stroke-width="1.3" marker-end="url(#ap)" opacity="0.5"/>
  <line x1="142" y1="278" x2="222" y2="298" stroke="#a78bfa" stroke-width="1.3" marker-end="url(#ap)" opacity="0.5"/>
  <line x1="260" y1="298" x2="342" y2="276" stroke="#a78bfa" stroke-width="1.3" marker-end="url(#ap)" opacity="0.5"/>
  <rect x="420" y="238" width="220" height="64" rx="10" fill="#a78bfa" fill-opacity="0.1" stroke="#a78bfa" stroke-opacity="0.5"/>
  <text x="530" y="264" font-size="12.5" fill="#c4b5fd" text-anchor="middle" font-weight="800">trace_path</text>
  <text x="530" y="284" font-size="10" fill="#c4b5fd" text-anchor="middle" opacity="0.7">one query · &lt;1ms</text>
  <!-- comparison -->
  <rect x="40" y="352" width="600" height="120" rx="12" fill="#161b22" stroke="#30363d"/>
  <text x="64" y="384" font-size="13" fill="#8b949e">file-by-file grep</text><text x="616" y="384" font-size="22" font-weight="800" fill="#71717a" text-anchor="end">~412k tokens</text>
  <line x1="64" y1="404" x2="616" y2="404" stroke="#30363d"/>
  <text x="64" y="436" font-size="13" fill="#c4b5fd">graph query</text><text x="616" y="438" font-size="26" font-weight="800" fill="#c4b5fd" text-anchor="end">~3.4k tokens</text>
  <text x="64" y="458" font-size="11.5" fill="#6ee7b7">99% fewer · runs locally, no LLM cost</text>
  <g transform="translate(600,48) scale(0.2)" opacity="0.16"><polyline points="-44,4 12,100 -44,196" stroke="#fff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none"/><polyline points="0,0 88,100 0,200" stroke="#fff" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" fill="none"/></g>
</svg>
