  <g font-size="13" fill="#8b949e"><text x="40" y="412">✓ Prompt injection · jailbreaks · RAG security</text><text x="40" y="440">✓ Typosquats · malicious postinstall · lockfile drift</text><text x="40" y="468">✓ Leaked keys · backdoors · obfuscated payloads</text></g>
