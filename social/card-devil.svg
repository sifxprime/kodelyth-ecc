   <rect x="197" y="212" width="145" height="40" rx="9" fill="#f87171" fill-opacity="0.09" stroke="#f87171" stroke-opacity="0.3"/><text x="269" y="236" fill="#fca5a5">supply-chain</text>
   <rect x="354" y="212" width="145" height="40" rx="9" fill="#f87171" fill-opacity="0.09" stroke="#f87171" stroke-opacity="0.3"/><text x="426" y="236" fill="#fca5a5">secret-hunter</text>
   <rect x="511" y="212" width="129" height="40" rx="9" fill="#f87171" fill-opacity="0.09" stroke="#f87171" stroke-opacity="0.3"/><text x="575" y="236" fill="#fca5a5">backdoor</text>
   <rect x="40"  y="262" width="145" height="40" rx="9" fill="#f87171" fill-opacity="0.06" stroke="#f87171" stroke-opacity="0.22"/><text x="112" y="286" fill="#f87171" opacity="0.85">jailbreak-tester</text>
   <rect x="197" y="262" width="145" height="40" rx="9" fill="#f87171" fill-opacity="0.06" stroke="#f87171" stroke-opacity="0.22"/><text x="269" y="286" fill="#f87171" opacity="0.85">code-stealer</text>
   <rect x="354" y="262" width="145" height="40" rx="9" fill="#f87171" fill-opacity="0.06" stroke="#f87171" stroke-opacity="0.22"/><text x="426" y="286" fill="#f87171" opacity="0.85">license-finder</text>
   <rect x="511" y="262" width="129" height="40" rx="9" fill="#f87171" fill-opacity="0.06" stroke="#f87171" stroke-opacity="0.22"/><text x="575" y="286" fill="#f87171" opacity="0.85">chaos-eng</text>
