<svg viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0d1117"/><stop offset="100%" stop-color="#161b22"/></linearGradient>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto"><path d="M0,0 L5,3 L0,6 Z" fill="#f59e0b" opacity="0.85"/></marker>
  </defs>
  <rect width="680" height="520" rx="18" fill="url(#bg)"/>
  <rect width="680" height="520" rx="18" fill="none" stroke="#21262d" stroke-width="1.5"/>
  <rect x="40" y="40" width="196" height="26" rx="13" fill="#f59e0b" fill-opacity="0.12" stroke="#f59e0b" stroke-opacity="0.4"/>
  <text x="138" y="57" font-size="12" fill="#fbbf24" text-anchor="middle" font-weight="700" letter-spacing="1.5">RTK · INPUT SAVINGS</text>
  <text x="40" y="112" font-size="30" font-weight="800" fill="#ffffff">60–90% fewer input</text>
  <text x="40" y="150" font-size="30" font-weight="800" fill="#ffffff">tokens, automatically</text>
  <text x="40" y="184" font-size="14.5" fill="#8b949e">Filters shell output before the model reads it.</text>
  <!-- vertical pipeline -->
  <rect x="40" y="222" width="600" height="66" rx="12" fill="#3f3f46" fill-opacity="0.22" stroke="#52525b" stroke-opacity="0.4"/>
  <text x="64" y="252" font-size="15" fill="#e5e7eb" font-weight="700">$ git status</text>
  <text x="64" y="274" font-size="12.5" fill="#71717a">~2,000 tokens · raw, noisy output</text>
  <line x1="340" y1="300" x2="340" y2="322" stroke="#f59e0b" stroke-width="2" marker-end="url(#ar)" opacity="0.7"/>
  <rect x="40" y="330" width="600" height="66" rx="12" fill="#f59e0b" fill-opacity="0.12" stroke="#f59e0b" stroke-opacity="0.5"/>
  <text x="64" y="360" font-size="15" fill="#fbbf24" font-weight="800">RTK filter</text>
  <text x="64" y="382" font-size="12.5" fill="#fbbf24" opacity="0.8">strip whitespace · group by dir · dedupe lines</text>
  <line x1="340" y1="408" x2="340" y2="430" stroke="#f59e0b" stroke-width="2" marker-end="url(#ar)" opacity="0.7"/>
  <rect x="40" y="438" width="600" height="60" rx="12" fill="#059669" fill-opacity="0.12" stroke="#34d399" stroke-opacity="0.5"/>
  <text x="64" y="466" font-size="15" fill="#34d399" font-weight="700">~200 tokens · −80%</text>
  <text x="470" y="474" font-size="20" font-weight="800" fill="#34d399" text-anchor="end">5.1M saved</text>
  <text x="616" y="474" font-size="14" fill="#6ee7b7" text-anchor="end">· 64%</text>
  <!-- brand mark -->
  <g transform="translate(600,48) scale(0.2)" opacity="0.16"><polyline points="-44,4 12,100 -44,196" stroke="#fff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none"/><polyline points="0,0 88,100 0,200" stroke="#fff" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" fill="none"/></g>
</svg>
