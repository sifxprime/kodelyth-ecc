<svg viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0d1117"/><stop offset="1" stop-color="#161b22"/></linearGradient></defs>
  <rect width="680" height="520" rx="18" fill="url(#bg)"/><rect width="680" height="520" rx="18" fill="none" stroke="#21262d" stroke-width="1.5"/>
  <rect x="40" y="40" width="196" height="26" rx="13" fill="#34d399" fill-opacity="0.12" stroke="#34d399" stroke-opacity="0.4"/>
  <text x="138" y="57" font-size="12" fill="#34d399" text-anchor="middle" font-weight="700" letter-spacing="1.5">TERSE · OUTPUT SAVINGS</text>
  <text x="40" y="112" font-size="30" font-weight="800" fill="#ffffff">40–70% fewer output</text>
  <text x="40" y="150" font-size="30" font-weight="800" fill="#ffffff">tokens, code intact</text>
  <text x="40" y="184" font-size="14.5" fill="#8b949e">A 4-level dial — byte-preserves every code block.</text>
  <g>
   <rect x="40" y="216" width="140" height="50" rx="9" fill="#3f3f46" fill-opacity="0.2" stroke="#52525b" stroke-opacity="0.4"/><text x="110" y="240" font-size="13" fill="#a1a1aa" text-anchor="middle" font-weight="700">off</text><text x="110" y="256" font-size="10" fill="#71717a" text-anchor="middle">0%</text>
   <rect x="192" y="216" width="140" height="50" rx="9" fill="#34d399" fill-opacity="0.08" stroke="#34d399" stroke-opacity="0.3"/><text x="262" y="240" font-size="13" fill="#34d399" text-anchor="middle" font-weight="700">lite</text><text x="262" y="256" font-size="10" fill="#34d399" text-anchor="middle" opacity="0.7">~25%</text>
   <rect x="344" y="216" width="140" height="50" rx="9" fill="#34d399" fill-opacity="0.14" stroke="#34d399" stroke-opacity="0.55" stroke-width="1.5"/><text x="414" y="240" font-size="13" fill="#34d399" text-anchor="middle" font-weight="800">full</text><text x="414" y="256" font-size="10" fill="#34d399" text-anchor="middle" opacity="0.8">~50%</text>
   <rect x="496" y="216" width="144" height="50" rx="9" fill="#059669" fill-opacity="0.2" stroke="#34d399" stroke-opacity="0.7" stroke-width="1.5"/><text x="568" y="240" font-size="13" fill="#6ee7b7" text-anchor="middle" font-weight="800">ultra</text><text x="568" y="256" font-size="10" fill="#6ee7b7" text-anchor="middle" opacity="0.85">~70%</text>
  </g>
  <rect x="40" y="290" width="600" height="96" rx="12" fill="#161b22" stroke="#30363d"/>
  <text x="60" y="318" font-size="11" fill="#6e7681" letter-spacing="1">NORMAL</text>
  <text x="60" y="340" font-size="13" fill="#8b949e">"Wrap the object in useMemo, since a new reference</text>
  <text x="60" y="358" font-size="13" fill="#8b949e">is created on every render cycle…"</text>
  <text x="60" y="378" font-size="14" fill="#6ee7b7" font-weight="700">→ TERSE: "New ref/render. useMemo it."</text>
  <g font-size="13" fill="#8b949e"><text x="40" y="424">✓ Code, commands, URLs, paths — byte-exact</text><text x="40" y="452">✓ Writes in your language, just tighter</text><text x="40" y="480">✓ /terse lite | full | ultra | off</text></g>
  <g transform="translate(600,48) scale(0.2)" opacity="0.16"><polyline points="-44,4 12,100 -44,196" stroke="#fff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none"/><polyline points="0,0 88,100 0,200" stroke="#fff" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" fill="none"/></g>
</svg>
