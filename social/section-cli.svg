<svg viewBox="0 0 900 170" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
  </defs>
  <rect width="900" height="170" fill="url(#bg)" rx="12"/>
  <rect width="900" height="170" fill="none" stroke="#21262d" stroke-width="1" rx="12"/>

  <rect x="32" y="20" width="200" height="22" rx="11" fill="#38bdf8" fill-opacity="0.12" stroke="#38bdf8" stroke-opacity="0.4" stroke-width="1"/>
  <text x="132" y="35" font-size="10" fill="#38bdf8" text-anchor="middle" font-weight="700" letter-spacing="1">INTERACTIVE CLI  v2.5.3</text>

  <text x="32" y="70" font-size="22" font-weight="800" fill="#ffffff">Type <tspan font-family="monospace" fill="#38bdf8">kodelythecc</tspan> — arrow-key menu, live update check</text>
  <text x="32" y="92" font-size="12" fill="#6e7681">dashboard · install another IDE · RTK/Terse/Codebase status · background daemon · uninstall</text>

  <!-- terminal window -->
  <rect x="32" y="106" width="520" height="52" rx="8" fill="#0a0c10" stroke="#30363d" stroke-width="1"/>
  <circle cx="46" cy="118" r="3" fill="#f87171"/><circle cx="57" cy="118" r="3" fill="#fbbf24"/><circle cx="68" cy="118" r="3" fill="#34d399"/>
  <text x="44" y="140" font-size="9.5" font-family="monospace" fill="#38bdf8" font-weight="700">▸ Open Dashboard</text>
  <text x="210" y="140" font-size="9.5" font-family="monospace" fill="#6e7681">Install for another IDE</text>
  <text x="44" y="153" font-size="9" font-family="monospace" fill="#6e7681">  RTK status · Terse status · Run in background</text>

  <!-- keys + update -->
  <rect x="572" y="112" width="140" height="20" rx="10" fill="#f59e0b" fill-opacity="0.12" stroke="#f59e0b" stroke-opacity="0.4" stroke-width="1"/>
  <text x="642" y="126" font-size="9" fill="#fbbf24" text-anchor="middle" font-weight="700">↑/↓  ⏎  q</text>
  <text x="572" y="150" font-size="9" fill="#6e7681">update check · 24h cached · npm registry</text>

  <g transform="translate(810, 28) scale(0.23)" opacity="0.14">
    <polyline points="-44,4 12,100 -44,196" stroke="#ffffff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <polyline points="0,0 88,100 0,200" stroke="#ffffff" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
