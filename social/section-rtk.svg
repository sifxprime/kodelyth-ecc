<svg viewBox="0 0 900 170" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L5,3 L0,6 Z" fill="#f59e0b" opacity="0.8"/>
    </marker>
  </defs>
  <rect width="900" height="170" fill="url(#bg)" rx="12"/>
  <rect width="900" height="170" fill="none" stroke="#21262d" stroke-width="1" rx="12"/>

  <!-- Label -->
  <rect x="32" y="20" width="200" height="22" rx="11" fill="#f59e0b" fill-opacity="0.12" stroke="#f59e0b" stroke-opacity="0.4" stroke-width="1"/>
  <text x="132" y="35" font-size="10" fill="#fbbf24" text-anchor="middle" font-weight="700" letter-spacing="1">RTK · INPUT SAVINGS  v2.5.3</text>

  <text x="32" y="70" font-size="22" font-weight="800" fill="#ffffff">Shell output shrunk 60–90% before the model reads it</text>
  <text x="32" y="92" font-size="12" fill="#6e7681">git · ls · cargo test · docker · 100+ commands · auto-wired PreToolUse hook · zero telemetry</text>

  <!-- Pipeline: raw -> RTK -> compact -->
  <rect x="32"  y="112" width="150" height="44" rx="8" fill="#3f3f46" fill-opacity="0.25" stroke="#52525b" stroke-opacity="0.5" stroke-width="1"/>
  <text x="107" y="132" font-size="11" fill="#a1a1aa" text-anchor="middle" font-weight="700">git status</text>
  <text x="107" y="147" font-size="8.5" fill="#71717a" text-anchor="middle">~2,000 tokens (raw)</text>

  <line x1="184" y1="134" x2="277" y2="134" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr)" opacity="0.6"/>

  <rect x="280" y="112" width="150" height="44" rx="8" fill="#f59e0b" fill-opacity="0.12" stroke="#f59e0b" stroke-opacity="0.55" stroke-width="1.5"/>
  <text x="355" y="132" font-size="11" fill="#fbbf24" text-anchor="middle" font-weight="800">RTK filter</text>
  <text x="355" y="147" font-size="8.5" fill="#fbbf24" text-anchor="middle" opacity="0.75">strip · group · dedupe</text>

  <line x1="432" y1="134" x2="525" y2="134" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr)" opacity="0.6"/>

  <rect x="528" y="112" width="150" height="44" rx="8" fill="#059669" fill-opacity="0.12" stroke="#34d399" stroke-opacity="0.5" stroke-width="1"/>
  <text x="603" y="132" font-size="11" fill="#34d399" text-anchor="middle" font-weight="700">compact</text>
  <text x="603" y="147" font-size="8.5" fill="#34d399" text-anchor="middle" opacity="0.75">~200 tokens · −80%</text>

  <!-- Live ledger stat -->
  <text x="704" y="128" font-size="9" fill="#6e7681">measured ledger</text>
  <text x="704" y="146" font-size="15" font-weight="800" fill="#fbbf24">5.1M saved · 64%</text>

  <!-- Ghost Depth Mark -->
  <g transform="translate(810, 28) scale(0.23)" opacity="0.14">
    <polyline points="-44,4 12,100 -44,196" stroke="#ffffff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <polyline points="0,0 88,100 0,200" stroke="#ffffff" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
