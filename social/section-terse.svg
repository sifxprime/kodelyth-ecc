<svg viewBox="0 0 900 170" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
  </defs>
  <rect width="900" height="170" fill="url(#bg)" rx="12"/>
  <rect width="900" height="170" fill="none" stroke="#21262d" stroke-width="1" rx="12"/>

  <rect x="32" y="20" width="210" height="22" rx="11" fill="#34d399" fill-opacity="0.12" stroke="#34d399" stroke-opacity="0.4" stroke-width="1"/>
  <text x="137" y="35" font-size="10" fill="#34d399" text-anchor="middle" font-weight="700" letter-spacing="1">TERSE · OUTPUT SAVINGS  v2.5.0</text>

  <text x="32" y="70" font-size="22" font-weight="800" fill="#ffffff">Replies compressed 40–70% — code stays byte-exact</text>
  <text x="32" y="92" font-size="12" fill="#6e7681">4-level dial · /terse lite | full | ultra | off · preserves code, commands, URLs, paths</text>

  <!-- 4-level dial -->
  <rect x="32"  y="114" width="130" height="42" rx="8" fill="#3f3f46" fill-opacity="0.22" stroke="#52525b" stroke-opacity="0.45" stroke-width="1"/>
  <text x="97"  y="132" font-size="11" fill="#a1a1aa" text-anchor="middle" font-weight="700">off</text>
  <text x="97"  y="147" font-size="8" fill="#71717a" text-anchor="middle">normal voice · 0%</text>

  <rect x="172" y="114" width="130" height="42" rx="8" fill="#34d399" fill-opacity="0.08" stroke="#34d399" stroke-opacity="0.3" stroke-width="1"/>
  <text x="237" y="132" font-size="11" fill="#34d399" text-anchor="middle" font-weight="700">lite</text>
  <text x="237" y="147" font-size="8" fill="#34d399" text-anchor="middle" opacity="0.7">light trim · ~25%</text>

  <rect x="312" y="114" width="130" height="42" rx="8" fill="#34d399" fill-opacity="0.14" stroke="#34d399" stroke-opacity="0.55" stroke-width="1.5"/>
  <text x="377" y="132" font-size="11" fill="#34d399" text-anchor="middle" font-weight="800">full · default</text>
  <text x="377" y="147" font-size="8" fill="#34d399" text-anchor="middle" opacity="0.8">fragments · ~50%</text>

  <rect x="452" y="114" width="130" height="42" rx="8" fill="#059669" fill-opacity="0.2" stroke="#34d399" stroke-opacity="0.7" stroke-width="1.5"/>
  <text x="517" y="132" font-size="11" fill="#6ee7b7" text-anchor="middle" font-weight="800">ultra</text>
  <text x="517" y="147" font-size="8" fill="#6ee7b7" text-anchor="middle" opacity="0.85">max · ~70%</text>

  <!-- before/after mini -->
  <text x="612" y="126" font-size="8.5" fill="#6e7681">"Wrap the object in useMemo,</text>
  <text x="612" y="137" font-size="8.5" fill="#6e7681">since a new ref is created…"</text>
  <text x="612" y="152" font-size="9.5" fill="#6ee7b7" font-weight="700">→ "New ref/render. useMemo it."</text>

  <g transform="translate(810, 28) scale(0.23)" opacity="0.14">
    <polyline points="-44,4 12,100 -44,196" stroke="#ffffff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <polyline points="0,0 88,100 0,200" stroke="#ffffff" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
