<svg viewBox="0 0 900 170" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="stack" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="50%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>
  <rect width="900" height="170" fill="url(#bg)" rx="12"/>
  <rect width="900" height="170" fill="none" stroke="#21262d" stroke-width="1" rx="12"/>

  <rect x="32" y="20" width="220" height="22" rx="11" fill="#34d399" fill-opacity="0.1" stroke="url(#stack)" stroke-opacity="0.5" stroke-width="1"/>
  <text x="142" y="35" font-size="10" fill="#e5e7eb" text-anchor="middle" font-weight="700" letter-spacing="1">TOKEN SAVINGS STACK</text>

  <text x="32" y="70" font-size="22" font-weight="800" fill="#ffffff">Three layers stack for 55–65% total token cut</text>
  <text x="32" y="92" font-size="12" fill="#6e7681">RTK shrinks input · Terse shrinks output · Codebase graph replaces grep — all local, zero telemetry</text>

  <!-- three layer bars -->
  <rect x="32" y="112" width="270" height="20" rx="5" fill="#f59e0b" fill-opacity="0.14" stroke="#f59e0b" stroke-opacity="0.5" stroke-width="1"/>
  <text x="42" y="126" font-size="9.5" fill="#fbbf24" font-weight="700">RTK</text>
  <text x="292" y="126" font-size="9" fill="#fbbf24" text-anchor="end">input −60–90%</text>

  <rect x="32" y="136" width="200" height="20" rx="5" fill="#34d399" fill-opacity="0.14" stroke="#34d399" stroke-opacity="0.5" stroke-width="1"/>
  <text x="42" y="150" font-size="9.5" fill="#34d399" font-weight="700">Terse</text>
  <text x="222" y="150" font-size="9" fill="#34d399" text-anchor="end">output −40–70%</text>

  <rect x="320" y="112" width="270" height="20" rx="5" fill="#a78bfa" fill-opacity="0.14" stroke="#a78bfa" stroke-opacity="0.5" stroke-width="1"/>
  <text x="330" y="126" font-size="9.5" fill="#c4b5fd" font-weight="700">Codebase graph</text>
  <text x="580" y="126" font-size="9" fill="#c4b5fd" text-anchor="end">query −99%</text>

  <rect x="320" y="136" width="270" height="20" rx="5" fill="url(#stack)" fill-opacity="0.18" stroke="url(#stack)" stroke-opacity="0.6" stroke-width="1"/>
  <text x="330" y="150" font-size="9.5" fill="#e5e7eb" font-weight="800">Combined session</text>
  <text x="580" y="150" font-size="10" fill="#ffffff" text-anchor="end" font-weight="800">−55–65%</text>

  <!-- big stat -->
  <text x="640" y="130" font-size="9" fill="#6e7681">measured, not estimated</text>
  <text x="640" y="150" font-size="15" font-weight="800" fill="#e5e7eb">dashboard ledger</text>

  <g transform="translate(810, 28) scale(0.23)" opacity="0.14">
    <polyline points="-44,4 12,100 -44,196" stroke="#ffffff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <polyline points="0,0 88,100 0,200" stroke="#ffffff" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
